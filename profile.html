<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About me — Harry's Insights</title>
<style>
  :root {
    --bg: #fbf8f6;
    --card: #ffffff;
    --text: #2b1a1e;
    --muted: #80716f;
    --accent: #b3223f;
    --accent-light: #fdeef1;
    --border: #ebe3e1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181214;
      --card: #241a1d;
      --text: #eee7e8;
      --muted: #ab9a9e;
      --accent: #fb7185;
      --accent-light: #361e25;
      --border: #372a2e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .logo span { color: var(--text); }
  .container { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
  .back { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
  .profile-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 40px; margin-top: 16px;
  }
  @media (max-width: 768px) { .profile-card { padding: 28px 20px; } }
  .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .avatar {
    width: 84px; height: 84px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover;
  }
  .profile-head h1 { font-size: 1.6rem; }
  .profile-head .tagline { color: var(--muted); font-size: 0.95rem; }
  h2 {
    font-size: 1.15rem; margin: 28px 0 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  p, ul { margin-bottom: 12px; }
  ul { padding-left: 22px; }
  a { color: var(--accent); }
  .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .links a {
    display: inline-block; background: var(--accent-light); color: var(--btn-text, var(--accent));
    border-radius: 999px; padding: 6px 16px; font-size: 0.88rem;
    text-decoration: none; font-weight: 600;
  }
  footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 32px 0 48px; }
  footer a { color: var(--muted); }
</style>
<script src="theme.js?v=6"></script>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="./">Harry's <span>Insights</span></a>
    <a class="back" href="./">&larr; 글 목록으로</a>
  </div>
</header>

<div class="container">
  <div class="profile-card">
    <div class="profile-head">
      <img class="avatar" src="https://github.com/hemil0102.png" alt="Harry">
      <div>
        <h1>Harry</h1>
        <p class="tagline">한 줄 소개를 여기에 적어주세요.</p>
      </div>
    </div>

    <h2>소개</h2>
    <p>
      자기소개를 여기에 작성하세요. 어떤 일을 하고 있고, 무엇에 관심이 있는지,
      이 블로그(insights)에는 어떤 글을 쌓아가고 있는지 등을 적으면 좋습니다.
    </p>

    <h2>하는 일 / 경력</h2>
    <ul>
      <li>현재 직무나 소속을 적어주세요.</li>
      <li>주요 경력이나 프로젝트를 적어주세요.</li>
    </ul>

    <h2>관심사</h2>
    <ul>
      <li>예: 프로덕트 매니지먼트, JTBD, 심리학</li>
    </ul>

    <h2>연락처</h2>
    <div class="links">
      <a href="mailto:hemil0102@gmail.com">Email</a>
      <a href="https://github.com/hemil0102" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</div>

<footer>
  콘텐츠 저장소: <a href="https://github.com/hemil0102/insights" target="_blank" rel="noopener">hemil0102/insights</a>
</footer>
</body>
</html>
