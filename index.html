<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<title>Harry's Insights</title>
<meta name="description" content="경영, 기술, 인사이트 노트 아카이브">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
  :root {
    --bg: #fbf8f6;
    --card: #ffffff;
    --text: #2b1a1e;
    --muted: #80716f;
    --accent: #b3223f;
    --accent-light: #fdeef1;
    --border: #ebe3e1;
    --code-bg: #f6f1f0;
    --header-glass: rgba(255, 255, 255, 0.72);
    --glass-fill: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(246,236,237,0.55));
    --glass-border: rgba(0, 0, 0, 0.08);
    --glass-inner: rgba(255, 255, 255, 0.9);
    --glass-shadow: rgba(0, 0, 0, 0.14);
    --tray-fill: rgba(0, 0, 0, 0.035);
    --pill-fill: rgba(0, 0, 0, 0.045);
    --rim: rgba(255, 255, 255, 0.95);
    --rim-b: rgba(255, 255, 255, 0.45);
    --sub-text: #5d4b4f;
    --sysbar: #ffffff; /* 시스템(상태)바 색: 라이트=흰색 */
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181214;
      --card: #241a1d;
      --text: #eee7e8;
      --muted: #ab9a9e;
      --accent: #fb7185;
      --accent-light: #361e25;
      --border: #372a2e;
      --code-bg: #2e2327;
      --header-glass: rgba(24, 17, 19, 0.72);
      --glass-fill: linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.07));
      --glass-border: rgba(255, 255, 255, 0.28);
      --glass-inner: rgba(255, 255, 255, 0.35);
      --glass-shadow: rgba(0, 0, 0, 0.55);
      --tray-fill: rgba(255, 255, 255, 0.06);
      --pill-fill: rgba(255, 255, 255, 0.09);
      --rim: rgba(255, 255, 255, 0.55);
      --rim-b: rgba(255, 255, 255, 0.18);
      --sub-text: #d1c3c6;
      --sysbar: #000000; /* 다크=검정 */
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* Safari가 상단 색을 페이지 배경에서 샘플링하는 경우 대비: html 배경 = 시스템바 색 */
  html { background: var(--sysbar, #ffffff); }
  body {
    font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    /* Safari 시스템바가 body의 background-color를 참고하므로 색상값은 흰/검으로,
       실제 보이는 바탕색은 background-image(단색 그라데이션)로 그림 */
    background-color: var(--sysbar, #ffffff);
    background-image: linear-gradient(var(--bg), var(--bg));
    color: var(--text);
    line-height: 1.7;
  }
  header {
    /* 펼침 메뉴(오버레이)와 동일한 배경·투명도·블러, 둥근 알약형 */
    background: var(--header-glass, rgba(255, 255, 255, 0.72));
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    position: fixed; top: 10px; left: 0; right: 0; z-index: 10;
    border-radius: 999px;
  }
  body { padding-top: calc(var(--header-h, 52px) + 20px); }
  /* 헤더 위/주변으로 지나가는 콘텐츠가 점점 흐려지며 사라지는 영역 */
  #top-fade {
    position: fixed; top: 0; left: 0; right: 0;
    height: calc(var(--header-h, 52px) + 14px);
    z-index: 9; pointer-events: none;
    transform: translateZ(0); /* iOS 스크롤 중 블러 레이어가 풀리는 현상 방지 */
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 35%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 0%, #000 35%, transparent 100%);
  }
  #top-fade::before {
    content: ""; position: absolute; inset: 0;
    /* 위는 시스템바 색으로 수렴, 아래로 갈수록 바탕색이 드러나 경계가 사라짐 */
    background: linear-gradient(to bottom,
      var(--sysbar, #ffffff) 0,
      var(--sysbar, #ffffff) 8px,
      transparent 34px);
  }
  /* 하단: 애플처럼 시스템바 색으로 덮어 뒤 콘텐츠(footer 등)를 가림.
     펼침 메뉴(z-index 9)보다 위에 두어 메뉴 뒤로 비치는 것도 함께 가림 */
  /* 펼침 메뉴 뒤 화면 전체를 덮는 불투명 판 — 유리(반투명)는 이 균일한 판을 블러하므로
     질감은 유지되고 페이지 콘텐츠는 완전히 가려짐 (하단 탭바 영역 포함) */
  #bottom-fade {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: -120px; /* 툴바 뒤까지 덮음 */
    z-index: 8; pointer-events: none;
    background: var(--sysbar, #ffffff);
  }
  body.menu-open #bottom-fade { display: block; }
  .header-inner {
    max-width: 1100px; margin: 0 auto; padding: 8px 24px;
    display: flex; align-items: center; gap: 28px;
  }
  .logo {
    font-size: 1.2rem; font-weight: 700;
    cursor: pointer; text-decoration: none; white-space: nowrap;
    color: var(--logo-accent, var(--header-text, #ffffff));
  }
  .logo span { color: var(--logo-accent, var(--header-text, #ffffff)); }
  .glass-ind {
    position: absolute; left: 0; top: 0; width: 0; height: 0; opacity: 0; z-index: 0;
    border-radius: 999px;
    will-change: left, top, width, height, transform;
    transform: translateZ(0);
    transition:
      left .45s cubic-bezier(.3,1.06,.4,1),
      top .45s cubic-bezier(.3,1.06,.4,1),
      width .45s cubic-bezier(.3,1.04,.4,1),
      height .45s cubic-bezier(.3,1.04,.4,1),
      transform .18s cubic-bezier(.34,1.2,.64,1),
      opacity .25s ease;
    pointer-events: none;
  }
  /* 완전 투명한 물방울 유리: 반사광·림만으로 표현 (::before = 유리 본체, ::after = 림) */
  .glass-ind::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: radial-gradient(140% 130% at 30% 12%,
      rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.015) 38%,
      rgba(255,255,255,0) 58%, rgba(255,255,255,0.04) 100%);
    box-shadow:
      inset 0 1px 2px rgba(255, 255, 255, 0.20),
      inset 0 -1.5px 3px rgba(255, 255, 255, 0.10),
      0 3px 7px rgba(0, 0, 0, 0.22);
  }
  .glass-ind::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 0.6px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.02) 35%,
      rgba(255,255,255,0.01) 60%, rgba(255,255,255,0.12) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }
  .glass-ind.traveling { transform: translateZ(0) scale(1.2, 1.4); }
  .glass-ind.traveling::before, .glass-ind.traveling::after {
    animation: dropJiggle .2s ease-in-out infinite;
  }
  @keyframes dropJiggle {
    0%   { transform: scale(1.025, 0.975) skewX(1.6deg); }
    25%  { transform: scale(0.99, 1.01) skewX(-0.5deg) skewY(0.5deg); }
    50%  { transform: scale(0.975, 1.025) skewX(-1.6deg); }
    75%  { transform: scale(1.012, 0.988) skewX(0.6deg) skewY(-0.5deg); }
    100% { transform: scale(1.025, 0.975) skewX(1.6deg); }
  }
  @keyframes dropLand {
    0%   { transform: scale(1.2, 1.4); }
    32%  { transform: scale(0.975, 1.03) skewX(0.9deg); }
    58%  { transform: scale(1.015, 0.98) skewX(-0.6deg); }
    80%  { transform: scale(0.994, 1.007) skewX(0.3deg); }
    100% { transform: scale(1, 1); }
  }
  .glass-ind.drop-land { animation: dropLand .45s cubic-bezier(.3,.7,.4,1); }
  /* 세로(모바일 오버레이) 메뉴: 좌우 확대 없이 상하 1.2배만 */
  #overlay-wrap .glass-ind.traveling { transform: translateZ(0) scale(1, 1.2); }
  @keyframes dropLandV {
    0%   { transform: scale(1, 1.2); }
    32%  { transform: scale(0.99, 1.02) skewX(0.5deg); }
    58%  { transform: scale(1.006, 0.99) skewX(-0.35deg); }
    100% { transform: scale(1, 1); }
  }
  #overlay-wrap .glass-ind.drop-land { animation: dropLandV .45s cubic-bezier(.3,.7,.4,1); }
  .glass-ind.no-anim { transition: none; }
  @media (hover: none), (pointer: coarse) {
    .glass-ind {
      box-shadow: inset 0 1px 1px var(--glass-inner);
    }
    .glass-ind::after { display: none; }
    /* 성능: 이동 중 잔물결 애니메이션 생략 */
    .glass-ind.traveling::before, .glass-ind.traveling::after { animation: none; }
  }
  @keyframes glassWobble {
    0%   { transform: scale(1, 1); }
    35%  { transform: scale(1.06, 0.95); }
    60%  { transform: scale(0.97, 1.04); }
    80%  { transform: scale(1.015, 0.99); }
    100% { transform: scale(1, 1); }
  }
  .glass-ind.wobble { animation: glassWobble .85s ease-out; }
  @keyframes glassSelect {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.14); }
    70%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  .glass-ind.select-pulse { animation: glassSelect .5s ease-out; }
  .topnav {
    margin-left: auto; display: flex; gap: 2px; position: relative;
    padding: 4px; border-radius: 999px;
    background: linear-gradient(160deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.08) 100%);
    -webkit-backdrop-filter: blur(6px) saturate(170%);
    backdrop-filter: blur(6px) saturate(170%);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.22),
      inset 0 -1px 1px rgba(0, 0, 0, 0.08),
      0 1px 4px rgba(0, 0, 0, 0.05),
      0 5px 12px rgba(0, 0, 0, 0.045);
  }
  .topnav::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.02) 62%, rgba(255,255,255,0.15) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }
  .topnav a {
    position: relative; z-index: 1;
    color: var(--header-text, #ffffff); text-decoration: none; font-size: 0.92rem; font-weight: 600;
    padding: 7px 16px; border-radius: 999px; white-space: nowrap;
    transition: color .25s ease;
  }
  .topnav a.active { color: var(--logo-accent, var(--accent)); }
  /* 하이라이트는 물방울(호버)을 따라다니고, 벗어나면 현재 페이지 메뉴로 복귀 */
  .topnav a:hover { color: var(--logo-accent, var(--accent)); }
  .topnav:hover a.active:not(:hover) { color: var(--header-text, #ffffff); }
  header.dd-open .topnav a[data-nav="insights"] { color: var(--logo-accent, var(--accent)); }
  header.dd-open .topnav a.active:not([data-nav="insights"]):not(:hover) { color: var(--header-text, #ffffff); }
  #menu-btn {
    display: none; width: 34px; height: 34px; border-radius: 50%;
    flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; padding: 0; font-family: inherit;
  }
  .mb-bar {
    display: block; width: 13px; height: 2px; border-radius: 2px;
    background: var(--header-text, #ffffff);
    transition: transform .3s cubic-bezier(.3,1.2,.4,1), opacity .2s ease;
  }
  #menu-btn.open .mb-bar:nth-child(1) { transform: translateY(5px) rotate(45deg); }
  #menu-btn.open .mb-bar:nth-child(2) { opacity: 0; transform: scaleX(0.3); }
  #menu-btn.open .mb-bar:nth-child(3) { transform: translateY(-5px) rotate(-45deg); }
  @media (max-width: 768px) {
    .topnav { display: none; }
    #menu-btn { display: flex; margin-left: auto; }
    .header-inner { gap: 12px; }
  }
  /* 캡슐 확장형(세로 모드와 동일): 드롭다운 패널이 헤더 영역까지 덮어 한 장의 유리 캡슐이 됨 */
  .dropdown {
    display: none;
    position: absolute; top: 0; left: 0; right: 0;
    padding-top: calc(var(--header-h, 52px) + 4px);
    background: var(--header-glass, rgba(255, 255, 255, 0.72));
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border-radius: 26px;
    transform-origin: top center;
  }
  .dropdown.open { animation: capsuleGrow .38s cubic-bezier(.3,1.05,.4,1); }
  .header-inner { position: relative; z-index: 2; }
  /* 열려 있는 동안 헤더 자체 배경·블러는 캡슐(드롭다운)에 위임 */
  header.dd-open {
    background: transparent;
    -webkit-backdrop-filter: none; backdrop-filter: none;
  }
  .dropdown.open { display: block; }
  .dropdown-inner { max-width: 1100px; margin: 0 auto; padding: 22px 24px 30px; position: relative; }
  .dropdown h3 {
    font-size: 0.78rem; color: var(--logo-accent, var(--accent)); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .dropdown .cat-btn {
    display: block; background: none; border: none; text-align: left; cursor: pointer;
    font-family: inherit; font-size: 1.15rem; font-weight: 700; color: var(--logo-accent, var(--accent));
    padding: 6px 14px; border-radius: 999px; position: relative; z-index: 1;
  }
  .dropdown .cat-btn .count { color: var(--logo-accent, var(--accent)); opacity: 0.75; font-size: 0.8rem; font-weight: 400; margin-left: 6px; }
  /* 캡슐 확장형: 헤더 알약이 아래로 늘어나 메뉴까지 한 덩어리가 됨 */
  .overlay {
    position: fixed; top: 10px; left: 0; right: 0; z-index: 9;
    background: var(--header-glass);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border-radius: 26px 26px 0 0;
    display: none;
    padding: calc(var(--header-h, 52px) + 4px) 28px 60px;
    height: 100vh;        /* iOS: 툴바 숨김 기준 큰 뷰포트 → 툴바 뒤까지 덮음 */
    height: 100lvh;       /* 지원 브라우저에서는 명시적 large viewport */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform-origin: top center;
  }
  .overlay.open { display: block; animation: capsuleGrow .38s cubic-bezier(.3,1.05,.4,1); }
  @keyframes capsuleGrow {
    0%   { opacity: 0; transform: scaleY(0.72); }
    100% { opacity: 1; transform: scaleY(1); }
  }
  /* 메뉴가 열리면 헤더는 캡슐 유리에 얹힌 상태가 되므로 자체 배경 제거 */
  body.menu-open header {
    background: transparent;
    -webkit-backdrop-filter: none; backdrop-filter: none;
  }
  .overlay-top { display: none; }
  #overlay-close {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text);
    font-size: 1.3rem; font-weight: 700; padding: 0; line-height: 0; font-family: inherit;
  }
  /* 팔레트 캡슐과 동일한 유리 질감 (모바일 메뉴/닫기 버튼) */
  #menu-btn, #overlay-close {
    position: relative; border: none;
    background: linear-gradient(160deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.05) 55%, rgba(255,255,255,0.14) 100%);
    -webkit-backdrop-filter: blur(6px) saturate(170%);
    backdrop-filter: blur(6px) saturate(170%);
    box-shadow:
      inset 0 1px 1.5px rgba(255, 255, 255, 0.45),
      inset 0 -1px 1px rgba(0, 0, 0, 0.10),
      0 2px 6px rgba(0, 0, 0, 0.07),
      0 8px 20px rgba(0, 0, 0, 0.06);
  }
  #menu-btn::after, #overlay-close::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.03) 62%, rgba(255,255,255,0.28) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
  }
  #overlay-wrap { position: relative; margin-top: 20px; }
  .m-link {
    display: block; color: var(--logo-accent, var(--text)); text-decoration: none;
    font-size: 1.25rem; font-weight: 700; padding: 8px 16px;
    border-radius: 999px; position: relative; z-index: 1;
  }
  .m-sub {
    margin: 2px 0 8px 0; padding: 2px 10px;
    background: none; border: none; box-shadow: none;
    transform-origin: top;
    animation: subExpand .35s ease-out;
  }
  @keyframes subExpand {
    0%   { opacity: 0; transform: translateY(-10px) scaleY(0.85); }
    100% { opacity: 1; transform: translateY(0) scaleY(1); }
  }
  .m-sub .cat-btn {
    display: block; background: none; border: none; text-align: left; cursor: pointer;
    font-family: inherit; font-size: 0.95rem; font-weight: 600; color: var(--sub-text);
    padding: 6px 14px; border-radius: 999px; position: relative; z-index: 1;
  }
  .m-sub .cat-btn .count { font-size: 0.8rem; font-weight: 400; margin-left: 6px; }
  .layout { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .main-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 56px 40px; text-align: center;
  }
  @media (max-width: 768px) { .main-card { padding: 36px 20px; } }
  .main-card h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .main-card.sub { text-align: left; margin-top: 24px; }
  .main-card.sub h2 { font-size: 1.3rem; margin-bottom: 12px; }
  .main-card .tagline { color: var(--muted); margin-bottom: 24px; }
  .main-card p { margin-bottom: 14px; }
  .main-card .links { justify-content: center; margin-top: 28px; }
  .list-head { color: var(--muted); font-size: 0.9rem; margin-bottom: 14px; }
  .post-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 14px; cursor: pointer; transition: box-shadow .15s, transform .15s;
  }
  .post-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .post-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .post-card .meta { font-size: 0.82rem; color: var(--muted); }
  .badge {
    display: inline-block; background: var(--header-glass, var(--accent-light)); color: var(--logo-accent, var(--accent));
    border-radius: 999px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; margin-right: 8px;
  }
  article {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px;
  }
  @media (max-width: 768px) { article { padding: 24px 20px; } }
  article h1 { font-size: 1.7rem; margin-bottom: 16px; line-height: 1.35; }
  article h2 { font-size: 1.3rem; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  article h3 { font-size: 1.1rem; margin: 22px 0 10px; }
  article p, article ul, article ol { margin-bottom: 14px; }
  article ul, article ol { padding-left: 24px; }
  article a { color: var(--accent); }
  article blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--muted); margin: 16px 0; }
  article code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
  article pre { background: var(--code-bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  article pre code { background: none; padding: 0; }
  article img { max-width: 100%; border-radius: 8px; }
  article table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
  article th, article td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  article span[style] { border-radius: 4px; padding: 1px 4px; }
  .profile-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px;
  }
  @media (max-width: 768px) { .profile-card { padding: 24px 20px; } }
  .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .avatar {
    width: 84px; height: 84px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover;
  }
  .profile-head h1 { font-size: 1.6rem; }
  .profile-head .tagline { color: var(--muted); font-size: 0.95rem; }
  .profile-card h2 { font-size: 1.15rem; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .profile-card p, .profile-card ul { margin-bottom: 12px; }
  .profile-card ul { padding-left: 22px; }
  .profile-card a { color: var(--accent); }
  .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .links a {
    display: inline-block; background: var(--header-glass, var(--accent-light)); color: var(--logo-accent, var(--accent));
    border-radius: 999px; padding: 6px 16px; font-size: 0.88rem;
    text-decoration: none; font-weight: 600;
  }
  .back-btn {
    background: none; border: none; color: var(--accent); cursor: pointer;
    font-size: 0.9rem; margin-bottom: 16px; padding: 0; font-family: inherit;
  }
  .article-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .article-meta a { color: var(--muted); }
  .status { color: var(--muted); padding: 40px 0; text-align: center; }
  footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 32px 0 48px; }
  footer a { color: var(--muted); }
</style>
<script src="theme.js?v=11"></script>
</head>
<body>
<div id="top-fade" aria-hidden="true"></div>
<div id="bottom-fade" aria-hidden="true"></div>
<header id="header">
  <div class="header-inner">
    <a class="logo" href="#/">Harry's <span>Insights</span></a>
    <nav class="topnav" id="topnav">
      <div class="glass-ind" id="nav-ind"></div>
      <a href="#/about" data-nav="about">About me</a>
      <a href="#/insights" data-nav="insights">Insights</a>
      <a href="#/book-report" data-nav="book">Book report</a>
    </nav>
    <button id="menu-btn" aria-label="메뉴 열기"><span class="mb-bar"></span><span class="mb-bar"></span><span class="mb-bar"></span></button>
  </div>
  <div class="dropdown" id="dropdown"></div>
</header>

<div class="overlay" id="overlay">
  <div class="overlay-top">
    <button id="overlay-close" aria-label="메뉴 닫기">&#10005;</button>
  </div>
  <div id="overlay-wrap">
    <div class="glass-ind" id="m-ind"></div>
    <nav id="overlay-nav"></nav>
  </div>
</div>

<div class="layout">
  <main id="main"><div class="status">글 목록을 불러오는 중...</div></main>
</div>

<footer>
  콘텐츠 저장소: <a href="https://github.com/hemil0102/insights" target="_blank" rel="noopener">hemil0102/insights</a>
</footer>

<script>
(function () {
  var OWNER = 'hemil0102';
  var REPO = 'insights';
  var BRANCH = 'main';
  var ROOT = 'Topics/'; // 이 폴더 아래 .md 파일만 글로 취급

  var API_TREE = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + BRANCH + '?recursive=1';
  var RAW_BASE = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/' + BRANCH + '/';
  var POSTS_URL = RAW_BASE + 'posts.json'; // Actions가 미리 생성한 글 목록 (API 제한 없음)

  var posts = [];        // {path, title, category}
  var activeCategory = 'All';
  var mInsightsOpen = false; // 모바일 메뉴에서 Insights 확장 여부
  var navInit = false;
  var hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

  var $main = document.getElementById('main');
  var $topnav = document.getElementById('topnav');
  var $navInd = document.getElementById('nav-ind');
  var $dropdown = document.getElementById('dropdown');
  var $overlay = document.getElementById('overlay');
  var $overlayNav = document.getElementById('overlay-nav');
  var $mInd = document.getElementById('m-ind');
  var $header = document.getElementById('header');

  function loadPosts() {
    return fetch(POSTS_URL)
      .then(function (r) {
        if (!r.ok) throw new Error('posts.json 없음');
        return r.json();
      })
      .then(function (list) {
        return list
          .filter(function (p) { return p && p.path && p.title; })
          .sort(function (a, b) { return a.title.localeCompare(b.title, 'ko'); });
      })
      .catch(function () {
        return fetchTree().then(buildPosts);
      });
  }

  function fetchTree() {
    var cached = sessionStorage.getItem('tree-cache');
    if (cached) {
      try { return Promise.resolve(JSON.parse(cached)); } catch (e) { /* fall through */ }
    }
    return fetch(API_TREE)
      .then(function (r) {
        if (!r.ok) throw new Error('GitHub API 오류 (' + r.status + ')');
        return r.json();
      })
      .then(function (data) {
        try { sessionStorage.setItem('tree-cache', JSON.stringify(data)); } catch (e) {}
        return data;
      });
  }

  function buildPosts(tree) {
    return tree.tree
      .filter(function (n) {
        return n.type === 'blob' && n.path.indexOf(ROOT) === 0 && /\.md$/i.test(n.path);
      })
      .map(function (n) {
        var rel = n.path.slice(ROOT.length);
        var parts = rel.split('/');
        var category = parts.length > 1 ? parts[0] : '기타';
        var file = parts[parts.length - 1].replace(/\.md$/i, '');
        return { path: n.path, title: file, category: category };
      })
      .sort(function (a, b) { return a.title.localeCompare(b.title, 'ko'); });
  }

  function categoryCounts() {
    var counts = {};
    posts.forEach(function (p) { counts[p.category] = (counts[p.category] || 0) + 1; });
    return counts;
  }

  function selectCategory(cat) {
    activeCategory = cat;
    closeDropdown();
    closeOverlay();
    if (location.hash !== '#/insights') location.hash = '#/insights';
    else { renderList(); updateNav(); }
  }

  /* ---------- 리퀴드 글래스 인디케이터 ---------- */

  var IND_HOLD_MS = 20; /* 도착 후 부푼 채 유지되는 시간 */
  function indLand($ind) {
    if (!$ind.classList.contains('traveling')) return;
    $ind.classList.remove('traveling');
    void $ind.offsetWidth;
    $ind.classList.add('drop-land');
  }
  function moveInd($ind, el, animate, pulse) {
    if (!$ind._landBound) {
      $ind._landBound = true;
      $ind.addEventListener('transitionend', function (e) {
        if (e.target === $ind && e.propertyName === 'left') {
          clearTimeout($ind._holdTimer);
          $ind._holdTimer = setTimeout(function () { indLand($ind); }, IND_HOLD_MS);
        }
      });
    }
    if (!el) {
      $ind.style.opacity = '0';
      $ind.classList.remove('wobble', 'select-pulse', 'traveling', 'drop-land');
      clearTimeout($ind._travelTimer);
      clearTimeout($ind._holdTimer);
      return;
    }
    var L = el.offsetLeft + 'px';
    var T = el.offsetTop + 'px';
    var W = el.offsetWidth + 'px';
    var H = el.offsetHeight + 'px';
    var same = $ind.style.opacity === '1' &&
      $ind.style.left === L &&
      $ind.style.top === T &&
      $ind.style.width === W;
    if (!animate) $ind.classList.add('no-anim');
    $ind.style.opacity = '1';
    $ind.style.left = L;
    $ind.style.top = T;
    $ind.style.width = W;
    $ind.style.height = H;
    if (!animate) {
      void $ind.offsetWidth;
      $ind.classList.remove('no-anim');
      return;
    }
    if (same && !pulse) return;
    clearTimeout($ind._travelTimer);
    clearTimeout($ind._holdTimer);
    $ind.classList.remove('wobble', 'select-pulse', 'drop-land');
    if (!same) {
      /* 부푼 채(가로 1.2배, 세로 1.4배) 자글자글 이동, 도착 후 20ms 뒤 축소 */
      $ind.classList.add('traveling');
      $ind._travelTimer = setTimeout(function () { indLand($ind); }, 560);
    } else {
      void $ind.offsetWidth;
      $ind.classList.add(pulse ? 'select-pulse' : 'wobble');
    }
  }

  function routeNavKey() {
    var h = location.hash;
    if (h === '#/about') return 'about';
    if (h === '#/book-report') return 'book';
    if (h === '#/insights' || h.indexOf('#/post/') === 0) return 'insights';
    return null;
  }

  /* ---------- 데스크톱 상단 메뉴 ---------- */

  function updateNav() {
    var key = routeNavKey();
    var activeEl = null;
    Array.prototype.forEach.call($topnav.querySelectorAll('a'), function (a) {
      var is = a.getAttribute('data-nav') === key;
      a.classList.toggle('active', is);
      if (is) activeEl = a;
    });
    moveInd($navInd, activeEl, navInit);
    navInit = true;
  }

  function topActiveEl() {
    var key = routeNavKey();
    return key ? $topnav.querySelector('[data-nav="' + key + '"]') : null;
  }

  Array.prototype.forEach.call($topnav.querySelectorAll('a'), function (a) {
    if (hasHover) {
      a.addEventListener('mouseenter', function () { moveInd($navInd, a, true); });
    }
    if (a.getAttribute('data-nav') === 'insights') {
      a.addEventListener('mouseenter', openDropdown);
      a.addEventListener('click', function () {
        activeCategory = 'All';
        closeDropdown();
        moveInd($navInd, a, true, true);
        if (location.hash === '#/insights') { renderList(); updateNav(); }
      });
    } else {
      a.addEventListener('mouseenter', closeDropdown);
      a.addEventListener('click', function () {
        moveInd($navInd, a, true, true);
      });
    }
  });

  if (hasHover) {
    $topnav.addEventListener('mouseleave', function () {
      if ($dropdown.classList.contains('open')) {
        moveInd($navInd, $topnav.querySelector('[data-nav="insights"]'), true);
      } else {
        moveInd($navInd, topActiveEl(), true);
      }
    });
  }

  function openDropdown() {
    var counts = categoryCounts();
    var cats = Object.keys(counts).sort();
    var html = '<div class="dropdown-inner"><div class="glass-ind" id="dd-ind"></div><h3>Insights 카테고리</h3>';
    html += '<button class="cat-btn" data-cat="All">모두 보기<span class="count">' + posts.length + '</span></button>';
    cats.forEach(function (c) {
      html += '<button class="cat-btn" data-cat="' + escapeAttr(c) + '">' + escapeHtml(c) +
        '<span class="count">' + counts[c] + '</span></button>';
    });
    html += '</div>';
    $dropdown.innerHTML = html;
    var $ddInd = document.getElementById('dd-ind');
    Array.prototype.forEach.call($dropdown.querySelectorAll('.cat-btn'), function (btn) {
      btn.addEventListener('click', function () { selectCategory(btn.getAttribute('data-cat')); });
      if (hasHover) {
        btn.addEventListener('mouseenter', function () { moveInd($ddInd, btn, true); });
      }
    });
    function ddActiveBtn() {
      if (routeNavKey() !== 'insights') return null;
      var found = null;
      Array.prototype.forEach.call($dropdown.querySelectorAll('.cat-btn'), function (btn) {
        if (btn.getAttribute('data-cat') === activeCategory) found = btn;
      });
      return found;
    }
    if (hasHover) {
      $dropdown.addEventListener('mouseleave', function () { moveInd($ddInd, ddActiveBtn(), true); });
    }
    $dropdown.classList.add('open');
    $header.classList.add('dd-open');
    /* 캡슐 펼침이 끝난 뒤, 선택돼 있는 카테고리 위에 물방울 표시 (세로 모드와 동일) */
    setTimeout(function () {
      if (!$dropdown.classList.contains('open')) return;
      var btn = ddActiveBtn();
      if (btn && !$dropdown.matches(':hover')) moveInd($ddInd, btn, false);
    }, 420);
    moveInd($navInd, $topnav.querySelector('[data-nav="insights"]'), true);
  }

  function closeDropdown() {
    if (!$dropdown.classList.contains('open')) return;
    $dropdown.classList.remove('open');
    $header.classList.remove('dd-open');
  }

  $header.addEventListener('mouseleave', function () {
    closeDropdown();
    moveInd($navInd, topActiveEl(), true);
  });

  /* ---------- 모바일 오버레이 메뉴 ---------- */

  function renderOverlayNav() {
    var counts = categoryCounts();
    var cats = Object.keys(counts).sort();
    var html =
      '<a href="#/about" class="m-link" data-nav="about">About me</a>' +
      '<a href="#/insights" class="m-link" data-nav="insights">Insights</a>';
    if (mInsightsOpen) {
      html += '<div class="m-sub">';
      html += '<button class="cat-btn" data-cat="All">모두 보기<span class="count">' + posts.length + '</span></button>';
      cats.forEach(function (c) {
        html += '<button class="cat-btn" data-cat="' + escapeAttr(c) + '">' + escapeHtml(c) +
          '<span class="count">' + counts[c] + '</span></button>';
      });
      html += '</div>';
    }
    html += '<a href="#/book-report" class="m-link" data-nav="book">Book report</a>';
    $overlayNav.innerHTML = html;
    Array.prototype.forEach.call($overlayNav.querySelectorAll('.m-link'), function (a) {
      if (hasHover) {
        a.addEventListener('mouseenter', function () { moveInd($mInd, a, true); });
      }
      a.addEventListener('click', function (e) {
        e.preventDefault();
        if (a.getAttribute('data-nav') === 'insights') {
          mInsightsOpen = !mInsightsOpen;
          renderOverlayNav();
          if (routeNavKey() !== 'insights') {
            /* About me 등 다른 화면: 위치가 안정적이므로 깜빡임 없이 물 흐르듯 이동
               펼치면 Insights 위로, 접으면 현재 화면 메뉴로 */
            var flowTarget = mInsightsOpen
              ? $overlayNav.querySelector('[data-nav="insights"]')
              : mActiveTarget();
            clearTimeout($mInd._settle);
            moveInd($mInd, flowTarget, true);
          } else {
            /* 카테고리 화면: 접기/펼치기로 레이아웃이 바뀌므로
               숨겼다가 애니메이션이 끝난 뒤 정확한 위치에 표시 */
            moveInd($mInd, null, false);
            clearTimeout($mInd._settle);
            $mInd._settle = setTimeout(function () {
              if (!$overlay.classList.contains('open')) return;
              moveInd($mInd, mActiveTarget(), false);
            }, 400);
          }
          return;
        }
        moveInd($mInd, a, true, true);
        setTimeout(function () {
          closeOverlay();
          location.hash = a.getAttribute('href');
        }, hasHover ? 200 : 420);
      });
    });
    Array.prototype.forEach.call($overlayNav.querySelectorAll('.cat-btn'), function (btn) {
      if (hasHover) {
        btn.addEventListener('mouseenter', function () { moveInd($mInd, btn, true); });
      }
      btn.addEventListener('click', function () {
        moveInd($mInd, btn, true, true);
        setTimeout(function () { selectCategory(btn.getAttribute('data-cat')); }, hasHover ? 200 : 420);
      });
    });
    if (hasHover) {
      $overlayNav.onmouseleave = function () {
        if (mInsightsOpen) {
          moveInd($mInd, $overlayNav.querySelector('[data-nav="insights"]'), true);
        } else {
          positionMIndByRoute(true);
        }
      };
    }
  }

  function positionMIndByRoute(animate) {
    var key = routeNavKey();
    var el = key ? $overlayNav.querySelector('[data-nav="' + key + '"]') : null;
    moveInd($mInd, el, animate);
  }

  /* 현재 화면에 해당하는 모바일 메뉴 요소(펼침 상태면 선택된 카테고리 버튼) */
  function mActiveTarget() {
    if (mInsightsOpen && routeNavKey() === 'insights') {
      var found = null;
      Array.prototype.forEach.call($overlayNav.querySelectorAll('.cat-btn'), function (btn) {
        if (btn.getAttribute('data-cat') === activeCategory) found = btn;
      });
      if (found) return found;
    }
    var key = routeNavKey();
    return key ? $overlayNav.querySelector('[data-nav="' + key + '"]') : null;
  }

  /* 애니메이션·재렌더링이 끝난 뒤 항상 신선한 요소를 다시 찾아 위치를 확정 */
  function settleMInd() {
    clearTimeout($mInd._settle);
    $mInd._settle = setTimeout(function () {
      if (!$overlay.classList.contains('open')) return;
      moveInd($mInd, mActiveTarget(), false);
    }, 700);
  }

  var $menuBtn = document.getElementById('menu-btn');

  /* 고정 헤더 높이만큼 본문 시작 위치 확보 */
  function setHeaderHeight() {
    document.documentElement.style.setProperty('--header-h', $header.offsetHeight + 'px');
  }
  setHeaderHeight();
  window.addEventListener('load', setHeaderHeight);
  window.addEventListener('resize', setHeaderHeight);

  function openOverlay() {
    /* Insights 화면이면 하위 카테고리를 펼친 채로 열고, 선택된 카테고리 위에 표시 */
    mInsightsOpen = (routeNavKey() === 'insights');
    renderOverlayNav();
    $overlay.classList.add('open');
    document.body.classList.add('menu-open');
    $menuBtn.classList.add('open');
    $menuBtn.setAttribute('aria-label', '메뉴 닫기');
    document.body.style.overflow = 'hidden';
    /* 캡슐 펼침 애니메이션이 끝난 뒤에 물방울을 표시 (도중 측정하면 위치가 어긋남) */
    moveInd($mInd, null, false);
    clearTimeout($mInd._settle);
    $mInd._settle = setTimeout(function () {
      if (!$overlay.classList.contains('open')) return;
      moveInd($mInd, mActiveTarget(), false);
    }, 420);
  }

  function closeOverlay() {
    clearTimeout($mInd._settle);
    $overlay.classList.remove('open');
    document.body.classList.remove('menu-open');
    $menuBtn.classList.remove('open');
    $menuBtn.setAttribute('aria-label', '메뉴 열기');
    document.body.style.overflow = '';
  }

  $menuBtn.addEventListener('click', function () {
    if ($overlay.classList.contains('open')) closeOverlay();
    else openOverlay();
  });

  /* 로고 클릭 시 메인으로 이동하며 펼침 메뉴 닫기 */
  document.querySelector('.header-inner .logo').addEventListener('click', function () {
    closeOverlay();
    closeDropdown();
  });

  /* 펼침 메뉴 바깥을 클릭/터치하면 닫기 */
  document.addEventListener('click', function (e) {
    /* 클릭 처리 중 메뉴가 다시 그려져 요소가 DOM에서 분리된 경우는 내부 클릭으로 간주 */
    if (!e.target.isConnected) return;
    if ($overlay.classList.contains('open') &&
        !$overlay.contains(e.target) && !$header.contains(e.target)) {
      closeOverlay();
    }
    if ($dropdown.classList.contains('open') && !$header.contains(e.target)) {
      closeDropdown();
    }
  });
  document.getElementById('overlay-close').addEventListener('click', closeOverlay);


  window.addEventListener('resize', function () {
    var key = routeNavKey();
    var el = null;
    Array.prototype.forEach.call($topnav.querySelectorAll('a'), function (a) {
      if (a.getAttribute('data-nav') === key) el = a;
    });
    moveInd($navInd, el, false);
    if ($overlay.classList.contains('open')) {
      /* 세로→가로 전환 시 모바일 펼침 메뉴 닫기 */
      if (window.innerWidth > 768) closeOverlay();
      else positionMIndByRoute(false);
    }
  });

  /* ---------- 본문 렌더링 ---------- */

  function renderList() {
    var list = posts.filter(function (p) {
      return activeCategory === 'All' || p.category === activeCategory;
    });
    var head = '';
    if (activeCategory !== 'All') {
      head = '<div class="list-head">Insights &rsaquo; ' + escapeHtml(activeCategory) +
        ' (' + list.length + ')</div>';
    }
    if (!list.length) {
      $main.innerHTML = head + '<div class="status">해당하는 글이 없습니다.</div>';
      return;
    }
    var html = head;
    list.forEach(function (p, i) {
      html += '<div class="post-card" data-i="' + i + '">' +
        '<h3>' + escapeHtml(p.title) + '</h3>' +
        '<div class="meta"><span class="badge">' + escapeHtml(p.category) + '</span></div></div>';
    });
    $main.innerHTML = html;
    Array.prototype.forEach.call($main.querySelectorAll('.post-card'), function (card) {
      card.addEventListener('click', function () {
        var p = list[parseInt(card.getAttribute('data-i'), 10)];
        location.hash = '#/post/' + encodeURIComponent(p.path);
      });
    });
  }

  function renderHome() {
    $main.innerHTML = '<div class="status">불러오는 중...</div>';
    fetch('main.html?v=' + Date.now())
      .then(function (r) {
        if (!r.ok) throw new Error('대문 페이지를 불러올 수 없습니다 (' + r.status + ')');
        return r.text();
      })
      .then(function (txt) {
        var doc = new DOMParser().parseFromString(txt, 'text/html');
        var card = doc.querySelector('#home-content') || doc.querySelector('.main-card');
        if (!card) throw new Error('대문 내용을 찾을 수 없습니다');
        $main.innerHTML = '';
        $main.appendChild(document.importNode(card, true));
        window.scrollTo(0, 0);
      })
      .catch(function (e) {
        $main.innerHTML = '<div class="status">오류: ' + escapeHtml(e.message) + '</div>';
      });
  }

  function renderAbout() {
    $main.innerHTML = '<div class="status">프로필을 불러오는 중...</div>';
    fetch('profile.html?v=' + Date.now())
      .then(function (r) {
        if (!r.ok) throw new Error('프로필을 불러올 수 없습니다 (' + r.status + ')');
        return r.text();
      })
      .then(function (txt) {
        var doc = new DOMParser().parseFromString(txt, 'text/html');
        var card = doc.querySelector('.profile-card');
        if (!card) throw new Error('프로필 내용을 찾을 수 없습니다');
        $main.innerHTML = '';
        $main.appendChild(document.importNode(card, true));
        window.scrollTo(0, 0);
      })
      .catch(function (e) {
        $main.innerHTML = '<div class="status">오류: ' + escapeHtml(e.message) + '</div>';
      });
  }

  function renderBookReport() {
    $main.innerHTML = '<article><h1>&#128218; Book report</h1>' +
      '<p>아직 준비 중인 공간입니다. 읽은 책에 대한 기록이 곧 이곳에 채워질 예정입니다.</p></article>';
    window.scrollTo(0, 0);
  }

  function renderPost(path) {
    var post = posts.filter(function (p) { return p.path === path; })[0];
    $main.innerHTML = '<div class="status">글을 불러오는 중...</div>';
    fetch(RAW_BASE + path.split('/').map(encodeURIComponent).join('/'))
      .then(function (r) {
        if (!r.ok) throw new Error('파일을 불러올 수 없습니다 (' + r.status + ')');
        return r.text();
      })
      .then(function (md) {
        var html = DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['style'] });
        var ghUrl = 'https://github.com/' + OWNER + '/' + REPO + '/blob/' + BRANCH + '/' +
          path.split('/').map(encodeURIComponent).join('/');
        $main.innerHTML =
          '<button class="back-btn" id="back">&larr; 목록으로</button>' +
          '<article>' +
          '<div class="article-meta">' +
          (post ? '<span class="badge">' + escapeHtml(post.category) + '</span>' : '') +
          '<a href="' + ghUrl + '" target="_blank" rel="noopener">GitHub에서 보기</a></div>' +
          html + '</article>';
        document.getElementById('back').addEventListener('click', function () {
          location.hash = '#/insights';
        });
        window.scrollTo(0, 0);
      })
      .catch(function (e) {
        $main.innerHTML = '<div class="status">오류: ' + escapeHtml(e.message) + '</div>';
      });
  }

  function route() {
    var h = location.hash;
    if (h.indexOf('#/post/') === 0) {
      renderPost(decodeURIComponent(h.slice(7)));
    } else if (h === '#/about') {
      renderAbout();
    } else if (h === '#/book-report') {
      renderBookReport();
    } else if (h === '#/insights') {
      renderList();
    } else {
      renderHome();
    }
    updateNav();
    closeDropdown();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }

  window.addEventListener('hashchange', route);

  loadPosts()
    .then(function (list) {
      posts = list;
      route();
    })
    .catch(function (e) {
      $main.innerHTML = '<div class="status">글 목록을 불러오지 못했습니다: ' +
        escapeHtml(e.message) + '<br>잠시 후 새로고침해 주세요. (GitHub API 시간당 60회 제한)</div>';
    });
})();
</script>
</body>
</html>
