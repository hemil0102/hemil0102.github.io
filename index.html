<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry's Insights</title>
<meta name="description" content="경영, 기술, 인사이트 노트 아카이브">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --accent: #001f4d;
    --accent-light: #eef2ff;
    --border: #e5e7eb;
    --code-bg: #f3f4f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111318;
      --card: #1a1d24;
      --text: #e7e9ee;
      --muted: #9aa0ab;
      --accent: #7ea6ff;
      --accent-light: #1e2636;
      --border: #2a2e37;
      --code-bg: #23262e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto; padding: 14px 24px;
    display: flex; align-items: center; gap: 28px;
  }
  .logo { font-size: 1.2rem; font-weight: 700; cursor: pointer; color: var(--text); text-decoration: none; white-space: nowrap; }
  .logo span { color: var(--accent); }
  .topnav { display: flex; gap: 26px; flex: 1; }
  .topnav a {
    color: var(--text); text-decoration: none; font-size: 0.92rem; font-weight: 500;
    padding: 6px 0; white-space: nowrap;
  }
  .topnav a:hover, .topnav a.active { color: var(--accent); }
  .topnav .count { color: var(--muted); font-size: 0.75rem; margin-left: 4px; }
  #search {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); width: 200px; font-size: 0.9rem;
  }
  #menu-btn {
    display: none; background: none; border: none; cursor: pointer;
    color: var(--text); font-size: 1.4rem; padding: 2px 6px; line-height: 1; font-family: inherit;
  }
  @media (max-width: 768px) {
    .topnav { display: none; }
    #search { display: none; }
    #menu-btn { display: block; margin-left: auto; }
    .header-inner { gap: 12px; }
  }
  .dropdown {
    display: none; background: var(--card); border-top: 1px solid var(--border);
  }
  .dropdown.open { display: block; }
  .dropdown-inner { max-width: 1100px; margin: 0 auto; padding: 22px 24px 30px; }
  .dropdown h3 {
    font-size: 0.78rem; color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .dropdown .cat-btn {
    display: block; background: none; border: none; text-align: left; cursor: pointer;
    font-family: inherit; font-size: 1.15rem; font-weight: 700; color: var(--text); padding: 6px 0;
  }
  .dropdown .cat-btn:hover { color: var(--accent); }
  .dropdown .cat-btn .count { color: var(--muted); font-size: 0.8rem; font-weight: 400; margin-left: 6px; }
  .overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 50;
    display: none; padding: 20px 28px 40px; overflow-y: auto;
  }
  .overlay.open { display: block; }
  .overlay-top { display: flex; justify-content: flex-end; }
  #overlay-close {
    background: none; border: none; cursor: pointer; color: var(--text);
    font-size: 1.5rem; padding: 4px 8px; line-height: 1; font-family: inherit;
  }
  .overlay nav { margin-top: 20px; }
  .m-link {
    display: block; color: var(--text); text-decoration: none;
    font-size: 1.65rem; font-weight: 700; padding: 10px 0;
  }
  .m-link:hover, .m-link.active { color: var(--accent); }
  .m-link .count { color: var(--muted); font-size: 0.95rem; font-weight: 400; margin-left: 8px; }
  .m-sub { margin: 2px 0 10px 6px; border-left: 1px solid var(--border); padding-left: 18px; }
  .m-sub .cat-btn {
    display: block; background: none; border: none; text-align: left; cursor: pointer;
    font-family: inherit; font-size: 1.1rem; font-weight: 600; color: var(--muted); padding: 7px 0;
  }
  .m-sub .cat-btn:hover { color: var(--accent); }
  .m-sub .cat-btn .count { font-size: 0.8rem; font-weight: 400; margin-left: 6px; }
  #m-search {
    width: 100%; margin-top: 24px; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); font-size: 1rem;
  }
  .layout { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .list-head { color: var(--muted); font-size: 0.9rem; margin-bottom: 14px; }
  .post-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 14px; cursor: pointer; transition: box-shadow .15s, transform .15s;
  }
  .post-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .post-card h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .post-card .meta { font-size: 0.82rem; color: var(--muted); }
  .badge {
    display: inline-block; background: var(--accent-light); color: var(--accent);
    border-radius: 999px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; margin-right: 8px;
  }
  article {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px;
  }
  @media (max-width: 768px) { article { padding: 24px 20px; } }
  article h1 { font-size: 1.7rem; margin-bottom: 16px; line-height: 1.35; }
  article h2 { font-size: 1.3rem; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  article h3 { font-size: 1.1rem; margin: 22px 0 10px; }
  article p, article ul, article ol { margin-bottom: 14px; }
  article ul, article ol { padding-left: 24px; }
  article a { color: var(--accent); }
  article blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--muted); margin: 16px 0; }
  article code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
  article pre { background: var(--code-bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  article pre code { background: none; padding: 0; }
  article img { max-width: 100%; border-radius: 8px; }
  article table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
  article th, article td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  article span[style] { border-radius: 4px; padding: 1px 4px; }
  .profile-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px;
  }
  @media (max-width: 768px) { .profile-card { padding: 24px 20px; } }
  .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .avatar {
    width: 84px; height: 84px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover;
  }
  .profile-head h1 { font-size: 1.6rem; }
  .profile-head .tagline { color: var(--muted); font-size: 0.95rem; }
  .profile-card h2 { font-size: 1.15rem; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .profile-card p, .profile-card ul { margin-bottom: 12px; }
  .profile-card ul { padding-left: 22px; }
  .profile-card a { color: var(--accent); }
  .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .links a {
    display: inline-block; background: var(--accent-light); color: var(--accent);
    border-radius: 999px; padding: 6px 16px; font-size: 0.88rem;
    text-decoration: none; font-weight: 600;
  }
  .back-btn {
    background: none; border: none; color: var(--accent); cursor: pointer;
    font-size: 0.9rem; margin-bottom: 16px; padding: 0; font-family: inherit;
  }
  .article-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .article-meta a { color: var(--muted); }
  .status { color: var(--muted); padding: 40px 0; text-align: center; }
  footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 32px 0 48px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header id="header">
  <div class="header-inner">
    <a class="logo" href="#/">Harry's <span>Insights</span></a>
    <nav class="topnav" id="topnav"></nav>
    <input id="search" type="search" placeholder="검색...">
    <button id="menu-btn" aria-label="메뉴 열기">&#9776;</button>
  </div>
  <div class="dropdown" id="dropdown"></div>
</header>

<div class="overlay" id="overlay">
  <div class="overlay-top">
    <button id="overlay-close" aria-label="메뉴 닫기">&#10005;</button>
  </div>
  <nav id="overlay-nav"></nav>
  <input id="m-search" type="search" placeholder="검색...">
</div>

<div class="layout">
  <main id="main"><div class="status">글 목록을 불러오는 중...</div></main>
</div>

<footer>
  콘텐츠 저장소: <a href="https://github.com/hemil0102/insights" target="_blank" rel="noopener">hemil0102/insights</a>
</footer>

<script>
(function () {
  var OWNER = 'hemil0102';
  var REPO = 'insights';
  var BRANCH = 'main';
  var ROOT = 'Topics/'; // 이 폴더 아래 .md 파일만 글로 취급

  var API_TREE = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + BRANCH + '?recursive=1';
  var RAW_BASE = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/' + BRANCH + '/';
  var POSTS_URL = RAW_BASE + 'posts.json'; // Actions가 미리 생성한 글 목록 (API 제한 없음)

  var posts = [];        // {path, title, category}
  var activeCategory = 'All';
  var searchTerm = '';

  var $main = document.getElementById('main');
  var $topnav = document.getElementById('topnav');
  var $dropdown = document.getElementById('dropdown');
  var $overlay = document.getElementById('overlay');
  var $overlayNav = document.getElementById('overlay-nav');
  var $header = document.getElementById('header');
  var $search = document.getElementById('search');
  var $mSearch = document.getElementById('m-search');

  function loadPosts() {
    return fetch(POSTS_URL)
      .then(function (r) {
        if (!r.ok) throw new Error('posts.json 없음');
        return r.json();
      })
      .then(function (list) {
        return list
          .filter(function (p) { return p && p.path && p.title; })
          .sort(function (a, b) { return a.title.localeCompare(b.title, 'ko'); });
      })
      .catch(function () {
        return fetchTree().then(buildPosts);
      });
  }

  function fetchTree() {
    var cached = sessionStorage.getItem('tree-cache');
    if (cached) {
      try { return Promise.resolve(JSON.parse(cached)); } catch (e) { /* fall through */ }
    }
    return fetch(API_TREE)
      .then(function (r) {
        if (!r.ok) throw new Error('GitHub API 오류 (' + r.status + ')');
        return r.json();
      })
      .then(function (data) {
        try { sessionStorage.setItem('tree-cache', JSON.stringify(data)); } catch (e) {}
        return data;
      });
  }

  function buildPosts(tree) {
    return tree.tree
      .filter(function (n) {
        return n.type === 'blob' && n.path.indexOf(ROOT) === 0 && /\.md$/i.test(n.path);
      })
      .map(function (n) {
        var rel = n.path.slice(ROOT.length);
        var parts = rel.split('/');
        var category = parts.length > 1 ? parts[0] : '기타';
        var file = parts[parts.length - 1].replace(/\.md$/i, '');
        return { path: n.path, title: file, category: category };
      })
      .sort(function (a, b) { return a.title.localeCompare(b.title, 'ko'); });
  }

  function categoryCounts() {
    var counts = {};
    posts.forEach(function (p) { counts[p.category] = (counts[p.category] || 0) + 1; });
    return counts;
  }

  function selectCategory(cat) {
    activeCategory = cat;
    closeDropdown();
    closeOverlay();
    if (location.hash && location.hash !== '#/') location.hash = '#/';
    else { renderList(); renderNav(); }
  }

  /* ---------- 데스크톱 상단 메뉴 ---------- */

  function renderNav() {
    var h = location.hash;
    var isAbout = h === '#/about';
    var isBook = h === '#/book-report';
    var isIns = !isAbout && !isBook;
    $topnav.innerHTML =
      '<a href="#/about" data-nav="about" class="' + (isAbout ? 'active' : '') + '">About me</a>' +
      '<a href="#/book-report" data-nav="book" class="' + (isBook ? 'active' : '') + '">Book Report</a>' +
      '<a href="#/" data-nav="insights" class="' + (isIns ? 'active' : '') + '">Insights<span class="count">' + posts.length + '</span></a>';
    Array.prototype.forEach.call($topnav.querySelectorAll('a'), function (a) {
      var nav = a.getAttribute('data-nav');
      if (nav === 'insights') {
        a.addEventListener('mouseenter', openDropdown);
        a.addEventListener('click', function () {
          activeCategory = 'All';
          closeDropdown();
          if (!location.hash || location.hash === '#/') { renderList(); renderNav(); }
        });
      } else {
        a.addEventListener('mouseenter', closeDropdown);
      }
    });
  }

  function openDropdown() {
    var counts = categoryCounts();
    var cats = Object.keys(counts).sort();
    var html = '<div class="dropdown-inner"><h3>Insights 카테고리</h3>';
    html += '<button class="cat-btn" data-cat="All">모두 보기<span class="count">' + posts.length + '</span></button>';
    cats.forEach(function (c) {
      html += '<button class="cat-btn" data-cat="' + escapeAttr(c) + '">' + escapeHtml(c) +
        '<span class="count">' + counts[c] + '</span></button>';
    });
    html += '</div>';
    $dropdown.innerHTML = html;
    Array.prototype.forEach.call($dropdown.querySelectorAll('.cat-btn'), function (btn) {
      btn.addEventListener('click', function () { selectCategory(btn.getAttribute('data-cat')); });
    });
    $dropdown.classList.add('open');
  }

  function closeDropdown() {
    $dropdown.classList.remove('open');
  }

  $header.addEventListener('mouseleave', closeDropdown);

  /* ---------- 모바일 오버레이 메뉴 ---------- */

  function renderOverlayNav() {
    var counts = categoryCounts();
    var cats = Object.keys(counts).sort();
    var h = location.hash;
    var isAbout = h === '#/about';
    var isBook = h === '#/book-report';
    var isIns = !isAbout && !isBook;
    var html =
      '<a href="#/about" class="m-link' + (isAbout ? ' active' : '') + '">About me</a>' +
      '<a href="#/book-report" class="m-link' + (isBook ? ' active' : '') + '">Book Report</a>' +
      '<a href="#/" class="m-link' + (isIns ? ' active' : '') + '" data-nav="insights">Insights<span class="count">' + posts.length + '</span></a>';
    html += '<div class="m-sub">';
    cats.forEach(function (c) {
      html += '<button class="cat-btn" data-cat="' + escapeAttr(c) + '">' + escapeHtml(c) +
        '<span class="count">' + counts[c] + '</span></button>';
    });
    html += '</div>';
    $overlayNav.innerHTML = html;
    Array.prototype.forEach.call($overlayNav.querySelectorAll('.m-link'), function (a) {
      a.addEventListener('click', function () {
        if (a.getAttribute('data-nav') === 'insights') activeCategory = 'All';
        closeOverlay();
        if (a.getAttribute('href') === '#/' && (!location.hash || location.hash === '#/')) {
          renderList(); renderNav();
        }
      });
    });
    Array.prototype.forEach.call($overlayNav.querySelectorAll('.cat-btn'), function (btn) {
      btn.addEventListener('click', function () { selectCategory(btn.getAttribute('data-cat')); });
    });
  }

  function openOverlay() {
    renderOverlayNav();
    $overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeOverlay() {
    $overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('menu-btn').addEventListener('click', openOverlay);
  document.getElementById('overlay-close').addEventListener('click', closeOverlay);

  /* ---------- 본문 렌더링 ---------- */

  function renderList() {
    var list = posts.filter(function (p) {
      var okCat = activeCategory === 'All' || p.category === activeCategory;
      var okSearch = !searchTerm || p.title.toLowerCase().indexOf(searchTerm) !== -1;
      return okCat && okSearch;
    });
    var head = '';
    if (activeCategory !== 'All') {
      head = '<div class="list-head">Insights &rsaquo; ' + escapeHtml(activeCategory) +
        ' (' + list.length + ')</div>';
    }
    if (!list.length) {
      $main.innerHTML = head + '<div class="status">해당하는 글이 없습니다.</div>';
      return;
    }
    var html = head;
    list.forEach(function (p, i) {
      html += '<div class="post-card" data-i="' + i + '">' +
        '<h3>' + escapeHtml(p.title) + '</h3>' +
        '<div class="meta"><span class="badge">' + escapeHtml(p.category) + '</span></div></div>';
    });
    $main.innerHTML = html;
    Array.prototype.forEach.call($main.querySelectorAll('.post-card'), function (card) {
      card.addEventListener('click', function () {
        var p = list[parseInt(card.getAttribute('data-i'), 10)];
        location.hash = '#/post/' + encodeURIComponent(p.path);
      });
    });
  }

  function renderAbout() {
    $main.innerHTML = '<div class="status">프로필을 불러오는 중...</div>';
    fetch('profile.html')
      .then(function (r) {
        if (!r.ok) throw new Error('프로필을 불러올 수 없습니다 (' + r.status + ')');
        return r.text();
      })
      .then(function (txt) {
        var doc = new DOMParser().parseFromString(txt, 'text/html');
        var card = doc.querySelector('.profile-card');
        if (!card) throw new Error('프로필 내용을 찾을 수 없습니다');
        $main.innerHTML = '';
        $main.appendChild(document.importNode(card, true));
        window.scrollTo(0, 0);
      })
      .catch(function (e) {
        $main.innerHTML = '<div class="status">오류: ' + escapeHtml(e.message) + '</div>';
      });
  }

  function renderBookReport() {
    $main.innerHTML = '<article><h1>&#128218; Book Report</h1>' +
      '<p>아직 준비 중인 공간입니다. 읽은 책에 대한 기록이 곧 이곳에 채워질 예정입니다.</p></article>';
    window.scrollTo(0, 0);
  }

  function renderPost(path) {
    var post = posts.filter(function (p) { return p.path === path; })[0];
    $main.innerHTML = '<div class="status">글을 불러오는 중...</div>';
    fetch(RAW_BASE + path.split('/').map(encodeURIComponent).join('/'))
      .then(function (r) {
        if (!r.ok) throw new Error('파일을 불러올 수 없습니다 (' + r.status + ')');
        return r.text();
      })
      .then(function (md) {
        var html = DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['style'] });
        var ghUrl = 'https://github.com/' + OWNER + '/' + REPO + '/blob/' + BRANCH + '/' +
          path.split('/').map(encodeURIComponent).join('/');
        $main.innerHTML =
          '<button class="back-btn" id="back">&larr; 목록으로</button>' +
          '<article>' +
          '<div class="article-meta">' +
          (post ? '<span class="badge">' + escapeHtml(post.category) + '</span>' : '') +
          '<a href="' + ghUrl + '" target="_blank" rel="noopener">GitHub에서 보기</a></div>' +
          html + '</article>';
        document.getElementById('back').addEventListener('click', function () {
          location.hash = '#/';
        });
        window.scrollTo(0, 0);
      })
      .catch(function (e) {
        $main.innerHTML = '<div class="status">오류: ' + escapeHtml(e.message) + '</div>';
      });
  }

  function route() {
    var h = location.hash;
    if (h.indexOf('#/post/') === 0) {
      renderPost(decodeURIComponent(h.slice(7)));
    } else if (h === '#/about') {
      renderAbout();
    } else if (h === '#/book-report') {
      renderBookReport();
    } else {
      renderList();
    }
    renderNav();
    closeDropdown();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function onSearchInput(value) {
    searchTerm = value.trim().toLowerCase();
    if (location.hash && location.hash !== '#/') location.hash = '#/';
    else renderList();
  }

  $search.addEventListener('input', function () { onSearchInput($search.value); });
  $mSearch.addEventListener('input', function () { onSearchInput($mSearch.value); });
  $mSearch.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') closeOverlay();
  });

  window.addEventListener('hashchange', route);

  loadPosts()
    .then(function (list) {
      posts = list;
      route();
    })
    .catch(function (e) {
      $main.innerHTML = '<div class="status">글 목록을 불러오지 못했습니다: ' +
        escapeHtml(e.message) + '<br>잠시 후 새로고침해 주세요. (GitHub API 시간당 60회 제한)</div>';
    });
})();
</script>
</body>
</html>
