<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry's Insights</title>
<meta name="description" content="경영, 기술, 인사이트 노트 아카이브">
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --accent: #001f4d;
    --accent-light: #eef2ff;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111318;
      --card: #1a1d24;
      --text: #e7e9ee;
      --muted: #9aa0ab;
      --accent: #7ea6ff;
      --accent-light: #1e2636;
      --border: #2a2e37;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
  .main-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 56px 40px; text-align: center;
  }
  @media (max-width: 768px) { .main-card { padding: 36px 20px; } }
  .main-card h1 { font-size: 2rem; margin-bottom: 8px; }
  .main-card .tagline { color: var(--muted); margin-bottom: 24px; }
  .main-card p { margin-bottom: 14px; }
  .main-card a { color: var(--accent); }
  .links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 28px; }
  .links a {
    display: inline-block; background: var(--accent-light); color: var(--accent);
    border-radius: 999px; padding: 6px 16px; font-size: 0.88rem;
    text-decoration: none; font-weight: 600;
  }
</style>
</head>
<body>

<!--
  이 파일이 홈페이지 대문입니다.
  index.html이 첫 화면에서 아래 .main-card 내용을 그대로 불러와 보여줍니다.
  .main-card 안의 내용만 자유롭게 수정하세요.
-->

<div class="container">
  <div class="main-card">
    <h1>Harry's Insights</h1>
    <p class="tagline">경영, 기술, 인사이트 노트 아카이브</p>
    <p>
      환영합니다. 이곳은 경영과 기술, 그리고 일상에서 얻은 통찰을
      기록하고 쌓아가는 공간입니다.
    </p>
    <p>
      대문에 담고 싶은 소개 문구를 이 곳에 자유롭게 적어주세요.
    </p>
    <div class="links">
      <a href="./#/insights">인사이트 보러가기</a>
      <a href="./#/about">About me</a>
      <a href="./#/book-report">Book Report</a>
    </div>
  </div>
</div>

</body>
</html>
